apiVersion: v1
kind: Service
metadata:
  name: saga
  namespace: backend
  labels:
    app: saga   # Phải trùng với ServiceMonitor
spec:
  ports:
    - name: http   # Phải trùng với ServiceMonitor endpoints.port
      port: 8080
      targetPort: 8080
  selector:
    app: saga

